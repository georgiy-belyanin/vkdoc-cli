name: Node.js CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Spell Check
        uses: crate-ci/typos@master
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm ci
      - name: Format
        run: npx prettier --check src/
      - name: Lint
        run: npm run lint
      - name: build
        run: npm run build
